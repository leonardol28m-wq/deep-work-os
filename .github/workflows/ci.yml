name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: deep-work-os-dist
          path: dist/
          retention-days: 7

      - name: Check build output
        run: |
          echo "=== Build output ==="
          ls -la dist/
          echo "=== Service worker ==="
          wc -c dist/service-worker.js
          echo "=== Manifest ==="
          cat dist/manifest.json
